name: Bug report
description: Report a problem with pyvvisf
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Filling in the
        following sections helps us reproduce the issue quickly.

  - type: input
    id: pyvvisf-version
    attributes:
      label: pyvvisf version
      description: Output of `python -c "import pyvvisf; print(pyvvisf.__version__)"`
      placeholder: 0.8.0
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other (please describe in the details)
    validations:
      required: true

  - type: textarea
    id: shader
    attributes:
      label: Minimal shader and Python snippet
      description: |
        A minimal example that reproduces the issue. Strip everything
        not required to trigger the bug.
      render: python
    validations:
      required: true

  - type: textarea
    id: traceback
    attributes:
      label: Full traceback / error output
      description: Paste the complete error output, including any wrapped GLSL source.
      render: shell
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else worth knowing — driver version, GPU, virtualization, etc.
