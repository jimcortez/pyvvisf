name: Feature request
description: Suggest an enhancement for pyvvisf
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case driving this request.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like pyvvisf to behave?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've evaluated.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, or sketches that help explain the request.
