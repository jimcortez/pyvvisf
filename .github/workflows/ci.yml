name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mypy
        run: mypy src/
        continue-on-error: true

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: lint
    runs-on: ${{ matrix.os }}
    # macOS GitHub-hosted runners don't expose a Cocoa graphics session that
    # GLFW can attach to, so windowed-context tests fail there even with
    # `pyvista/setup-headless-display-action`. We still run the matrix cell
    # so parser/validation tests that don't open a GL context are exercised,
    # but failures don't block the PR. Tracked for follow-up.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@v3

      - name: Run tests
        # Show the full GLFW error reason on stderr if context creation fails.
        run: pytest tests/ -v --log-cli-level=WARNING
