name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  lint:
    name: Lint and type-check
    needs: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: mypy (advisory)
        run: mypy src/
        continue-on-error: true

  package-build:
    name: Build sdist and wheel (PR validation)
    needs: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Check distributions with twine
        run: pipx run twine check --strict dist/*

      - name: Smoke-install built wheel
        run: |
          set -euo pipefail
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --upgrade pip
          /tmp/smoke-venv/bin/pip install dist/*.whl
          /tmp/smoke-venv/bin/python -c "import pyvvisf; print(pyvvisf.__version__)"

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Set up headless display
        uses: pyvista/setup-headless-display-action@v4

      # Linux/Windows: run the full suite as a single required step.
      - name: Run tests
        if: matrix.os != 'macos-latest'
        run: pytest tests/ -v --log-cli-level=WARNING

      # macOS GitHub-hosted runners don't expose a Cocoa graphics session that
      # GLFW can attach to (`NSGL: Failed to find a suitable pixel format`),
      # so we split the suite by the `graphics` marker. Non-graphics tests
      # (parser/validation) are required; graphics tests are advisory until
      # the runner-environment limitation is resolved.
      - name: Run tests (macOS, non-graphics)
        if: matrix.os == 'macos-latest'
        run: pytest tests/ -v -m "not graphics" --log-cli-level=WARNING

      - name: Run tests (macOS, graphics — advisory)
        if: matrix.os == 'macos-latest'
        run: pytest tests/ -v -m "graphics" --log-cli-level=WARNING
        continue-on-error: true

      - name: Upload coverage report
        if: always() && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore
